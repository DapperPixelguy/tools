<!DOCTYPE html>

<html lang="en">

<head>
    <title>Home | Tools</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Chelsea+Market&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

    <!-- Fonts -->

    <link rel="stylesheet" href="{{url_for('static', filename='style.css') }}">
</head>

<body>
<header>
    Tools.DapperPixelguy.wtf
</header>
<div id="content">
    <div id="tools-bar">
        {% for tool in tools %}
        <div class="tool">
            <a href="{{ tool.hash }}" data-content="{{ tool.content }}">{{ tool.name }}</a>
        </div>
        {% endfor %}
    </div>
    <div id="tool-display">

    </div>
</div>
<script src="{{ url_for('static', filename='index.js') }}"></script>

</body>

</html>
