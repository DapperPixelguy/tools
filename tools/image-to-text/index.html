<!DOCTYPE HTML>
<html lang="en">
<head>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Chelsea+Market&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
<body>
<div class='content'>
<h1>Album cover (or image) to text</h1>

    <div class="main">
        <div class="entry">
            <div class="input-field required">
                <input type="text" placeholder=" " id="artist-name" name="artist-name">
                <label for="artist-name">Artist name</label>
            </div>

            <div class="input-field required">
                <input type="text" placeholder=" " id="album-name" name="album-name">
                <label for="album-name">Album name</label>
            </div>

            <div class="input-field">
                <input type="text" placeholder=" " id="length" name="length" style="height: 2rem">
                <label for="length">Length</label>
            </div>

            <input type="submit" id="submit" name="submit" value="Generate">
        </div>
        <div class="preview">

        </div>
    </div>
</div>
</body>

</html>
